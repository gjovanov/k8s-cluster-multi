---
all:
  children:
    # Bare-metal hosts (for host-level tasks: KVM, WireGuard, iptables)
    bare_metal:
      hosts:
        mars:
          ansible_host: "{{ bare_metal_hosts.mars.public_ip }}"
          ansible_connection: local
          host_name: mars
        zeus:
          ansible_host: "{{ bare_metal_hosts.zeus.public_ip }}"
          ansible_ssh_private_key_file: "{{ home_dir }}/.ssh/id_secunet"
          host_name: zeus
        jupiter:
          ansible_host: "{{ bare_metal_hosts.jupiter.public_ip }}"
          ansible_ssh_private_key_file: "{{ home_dir }}/.ssh/id_secunet"
          host_name: jupiter
      vars:
        ansible_user: "{{ host_user }}"
        ansible_python_interpreter: /usr/bin/python3
        ansible_become: true

    # Root access for initial bootstrap (before host_user exists on new hosts)
    # Uses the converted PuTTY key at files/ssh/bootstrap/id_ed25519
    bare_metal_bootstrap:
      hosts:
        zeus_bootstrap:
          ansible_host: "{{ bare_metal_hosts.zeus.public_ip }}"
          ansible_user: root
          ansible_ssh_private_key_file: "{{ project_dir }}/files/ssh/bootstrap/id_ed25519"
          ansible_python_interpreter: /usr/bin/python3
          host_name: zeus
        jupiter_bootstrap:
          ansible_host: "{{ bare_metal_hosts.jupiter.public_ip }}"
          ansible_user: root
          ansible_ssh_private_key_file: "{{ project_dir }}/files/ssh/bootstrap/id_ed25519"
          ansible_python_interpreter: /usr/bin/python3
          host_name: jupiter

    # K8s cluster VMs
    k8s_cluster:
      children:
        k8s_masters:
          hosts:
            k8s-master-1:
              ansible_host: 10.10.10.10
              vm_host: mars
              vm_vcpu: 2
              vm_memory: 8192
              vm_disk_gb: 40
            k8s-master-2:
              ansible_host: 10.10.20.10
              ansible_ssh_common_args: >-
                -o ProxyCommand="ssh -W %h:%p -i {{ home_dir }}/.ssh/id_secunet {{ host_user }}@{{ bare_metal_hosts.zeus.public_ip }}"
              vm_host: zeus
              vm_vcpu: 2
              vm_memory: 8192
              vm_disk_gb: 40
            k8s-master-3:
              ansible_host: 10.10.30.10
              ansible_ssh_common_args: >-
                -o ProxyCommand="ssh -W %h:%p -i {{ home_dir }}/.ssh/id_secunet {{ host_user }}@{{ bare_metal_hosts.jupiter.public_ip }}"
              vm_host: jupiter
              vm_vcpu: 2
              vm_memory: 8192
              vm_disk_gb: 40

        k8s_workers:
          hosts:
            k8s-worker-1:
              ansible_host: 10.10.10.11
              vm_host: mars
              vm_vcpu: 4
              vm_memory: 32768
              vm_disk_gb: 100
              public_ip: "94.130.141.98"
              coturn_instance: coturn-worker-1
            k8s-worker-2:
              ansible_host: 10.10.20.11
              ansible_ssh_common_args: >-
                -o ProxyCommand="ssh -W %h:%p -i {{ home_dir }}/.ssh/id_secunet {{ host_user }}@{{ bare_metal_hosts.zeus.public_ip }}"
              vm_host: zeus
              vm_vcpu: 12
              vm_memory: 98304
              vm_disk_gb: 200
              public_ip: "5.9.157.226"
              coturn_instance: coturn-worker-2
            k8s-worker-3:
              ansible_host: 10.10.30.11
              ansible_ssh_common_args: >-
                -o ProxyCommand="ssh -W %h:%p -i {{ home_dir }}/.ssh/id_secunet {{ host_user }}@{{ bare_metal_hosts.jupiter.public_ip }}"
              vm_host: jupiter
              vm_vcpu: 12
              vm_memory: 98304
              vm_disk_gb: 200
              public_ip: "5.9.157.221"
              coturn_instance: coturn-worker-3

      vars:
        ansible_user: ubuntu
        ansible_python_interpreter: /usr/bin/python3
        ansible_become: true

    # Per-host VM SSH key mapping
    mars_vms:
      hosts:
        k8s-master-1:
        k8s-worker-1:
      vars:
        ansible_ssh_private_key_file: "{{ project_dir }}/files/ssh/mars/k8s_ed25519"

    zeus_vms:
      hosts:
        k8s-master-2:
        k8s-worker-2:
      vars:
        ansible_ssh_private_key_file: "{{ project_dir }}/files/ssh/zeus/k8s_ed25519"
        ansible_ssh_common_args: >-
          -o ProxyCommand="ssh -W %h:%p -i {{ home_dir }}/.ssh/id_secunet {{ host_user }}@{{ bare_metal_hosts.zeus.public_ip }}"

    jupiter_vms:
      hosts:
        k8s-master-3:
        k8s-worker-3:
      vars:
        ansible_ssh_private_key_file: "{{ project_dir }}/files/ssh/jupiter/k8s_ed25519"
        ansible_ssh_common_args: >-
          -o ProxyCommand="ssh -W %h:%p -i {{ home_dir }}/.ssh/id_secunet {{ host_user }}@{{ bare_metal_hosts.jupiter.public_ip }}"

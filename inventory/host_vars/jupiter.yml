---
# Jupiter (5.9.157.221) — host firewall allow-list.
#
# Jupiter hosts roomler-ai (with mediasoup RTC range 40000-49999) on worker-3.
# Public-facing host services: SSH + WireGuard only.
host_firewall_allowed_tcp:
  - 3478
  - 5349
host_firewall_allowed_udp:
  - 3478
  - 5349
  - 51820

host_firewall_vm_subnet: "10.10.30.0/24"
host_firewall_vm_dest_ip: "10.10.30.11"
host_firewall_jupiter_extra: true

host_hardening_expected_tcp:
  - 22         # sshd
  - 53         # libvirt dnsmasq + systemd-resolve (loopback only)
  - 8443       # haproxy K8s API LB (loopback only)
  - 9100       # node-exporter (only via WG mesh)
host_hardening_expected_udp:
  - 53         # dnsmasq + systemd-resolve
  - 51820      # WireGuard
  # libvirt dnsmasq picks an ephemeral high UDP port for upstream queries; we
  # do NOT allow-list ephemeral ranges here — the drift alert will fire if it
  # binds, but that's noise we accept for now.


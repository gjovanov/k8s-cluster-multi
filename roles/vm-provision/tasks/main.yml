---
# VM Provision - runs on each bare-metal host
# Creates and boots VMs that belong to this host

- name: Read SSH public key for this host
  set_fact:
    ssh_public_key: "{{ lookup('file', project_dir + '/files/ssh/' + host_name + '/k8s_ed25519.pub') }}"

- name: Ensure cloud image directory exists
  file:
    path: "{{ cloud_image_dir }}"
    state: directory
    mode: "0755"

- name: Check if cloud image already downloaded
  stat:
    path: "{{ cloud_image_dir }}/{{ cloud_image_name }}"
  register: cloud_image_stat

- name: Download cloud image if needed
  get_url:
    url: "{{ cloud_image_url }}"
    dest: "{{ cloud_image_dir }}/{{ cloud_image_name }}"
    mode: "0644"
    timeout: 600
  when: not cloud_image_stat.stat.exists

- name: Filter VMs for this host
  set_fact:
    host_vms: "{{ vms | selectattr('host', 'equalto', host_name) | list }}"

- name: Create VMs for this host
  include_tasks: create-vm.yml
  loop: "{{ host_vms }}"
  loop_control:
    loop_var: vm

- name: Wait for SSH on all VMs for this host
  wait_for:
    host: "{{ vm.ip }}"
    port: 22
    timeout: 300
    state: started
  loop: "{{ host_vms }}"
  loop_control:
    loop_var: vm
    label: "{{ vm.name }} ({{ vm.ip }})"

- name: Verify connectivity
  include_tasks: verify-connectivity.yml

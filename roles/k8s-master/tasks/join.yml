---
# =============================================================================
# Join additional control-plane nodes (k8s-master-2, k8s-master-3)
# Run with serial: 1 to join one at a time
# =============================================================================

- name: Check if already joined to cluster
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_already_joined

- name: Join as control-plane node
  command: "{{ hostvars[k8s_first_master]['k8s_cp_join_command'] }}"
  register: kubeadm_join_output
  timeout: 300
  when: not kubeadm_already_joined.stat.exists

- name: Display join result
  debug:
    var: kubeadm_join_output.stdout_lines
  when: kubeadm_join_output is defined and kubeadm_join_output is not skipped

- name: Create .kube directory for ubuntu user
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy admin.conf to ubuntu user kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0600"

- name: Set ownership on kubeconfig
  file:
    path: /home/ubuntu/.kube/config
    owner: ubuntu
    group: ubuntu
    mode: "0600"

- name: Wait for this node to become Ready
  command: >
    kubectl get node {{ inventory_hostname }}
    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  become: true
  become_user: ubuntu
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  delegate_to: "{{ k8s_first_master }}"
  register: node_ready
  retries: 30
  delay: 10
  until: node_ready.stdout == "True"
  changed_when: false

- name: Display node status
  command: kubectl get nodes -o wide
  become: true
  become_user: ubuntu
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  delegate_to: "{{ k8s_first_master }}"
  register: nodes_status
  changed_when: false

- name: Display all nodes
  debug:
    var: nodes_status.stdout_lines

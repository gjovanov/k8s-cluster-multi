---
- name: Reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Restart sshd
  ansible.builtin.systemd:
    name: ssh
    state: restarted

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted

- name: Restart auditd
  ansible.builtin.command: service auditd restart
  changed_when: true

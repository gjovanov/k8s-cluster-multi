---
# Drift guard: ensure Ollama is not present. If a future operator runs
# `curl https://ollama.com/install.sh | sh`, the next ansible play fails loudly.
# Same pattern can be extended to other unmanaged services (frps, ngrok, etc.).

- name: Assert no Ollama binary
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /usr/local/bin/ollama
    - /usr/bin/ollama
    - /usr/local/lib/ollama
    - /usr/share/ollama
    - /etc/systemd/system/ollama.service
    - /etc/systemd/system/ollama.service.d
  register: ollama_paths

- name: Fail if any Ollama path exists
  ansible.builtin.fail:
    msg: |
      Ollama artefact present: {{ item.item }}
      This service is intentionally banned from the cluster (see
      docs/security-audit-2026-04-30.md). Remove with:
        sudo systemctl stop ollama || true
        sudo systemctl disable ollama || true
        sudo rm -rf /etc/systemd/system/ollama.service /etc/systemd/system/ollama.service.d
        sudo rm -f  /usr/local/bin/ollama /usr/bin/ollama
        sudo rm -rf /usr/local/lib/ollama /usr/share/ollama
        sudo userdel ollama 2>/dev/null
        sudo groupdel ollama 2>/dev/null
        sudo systemctl daemon-reload
  loop: "{{ ollama_paths.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.stat.exists

- name: Assert no Ollama process
  ansible.builtin.shell: pgrep -af '[o]llama' || true
  register: ollama_proc
  changed_when: false

- name: Fail if any Ollama process is running
  ansible.builtin.fail:
    msg: "Ollama process detected: {{ ollama_proc.stdout }}"
  when: ollama_proc.stdout | length > 0

- name: Assert no listener on :11434
  ansible.builtin.shell: ss -tlnp 2>/dev/null | grep -E ':11434\b' || true
  register: ollama_listener
  changed_when: false

- name: Fail if :11434 is listening
  ansible.builtin.fail:
    msg: "Listener on :11434 detected: {{ ollama_listener.stdout }}"
  when: ollama_listener.stdout | length > 0

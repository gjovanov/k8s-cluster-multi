---
# Prepare all K8s nodes: disable swap, install containerd + K8s packages
# Runs on k8s_cluster group (all 6 VMs)

# ============================================================
# Swap
# ============================================================
- name: Disable swap
  command: swapoff -a
  changed_when: false

- name: Remove swap entries from fstab
  lineinfile:
    path: /etc/fstab
    regexp: '\s+swap\s+'
    state: absent

# ============================================================
# Kernel modules
# ============================================================
- name: Load overlay kernel module
  modprobe:
    name: overlay
    state: present

- name: Load br_netfilter kernel module
  modprobe:
    name: br_netfilter
    state: present

- name: Persist kernel modules for K8s
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    owner: root
    group: root
    mode: "0644"

# ============================================================
# Sysctl
# ============================================================
- name: Set sysctl parameters for K8s networking
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
    owner: root
    group: root
    mode: "0644"

- name: Apply sysctl parameters
  command: sysctl --system
  changed_when: false

# ============================================================
# Apt prerequisites
# ============================================================
- name: Update apt cache
  apt:
    update_cache: true
  retries: 3
  delay: 10
  register: apt_update
  until: apt_update is succeeded

- name: Install prerequisite packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
      - conntrack
      - socat
      - ipset
    state: present

# ============================================================
# Containerd
# ============================================================
- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Add Docker apt repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Update apt cache after Docker repo
  apt:
    update_cache: true

- name: Install containerd.io
  apt:
    name: "containerd.io={{ containerd_version }}"
    state: present

- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate default containerd config
  shell: containerd config default > /etc/containerd/config.toml
  notify: Restart containerd

- name: Enable CRI plugin (remove from disabled_plugins)
  replace:
    path: /etc/containerd/config.toml
    regexp: 'disabled_plugins = \["cri"\]'
    replace: 'disabled_plugins = []'
  notify: Restart containerd

- name: Set SystemdCgroup = true in containerd config
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup\s*=\s*false'
    replace: 'SystemdCgroup = true'
  notify: Restart containerd

- name: Set sandbox image to pause:3.10 (match kubeadm expectation)
  replace:
    path: /etc/containerd/config.toml
    regexp: 'sandbox_image = "registry.k8s.io/pause:3\.\d+"'
    replace: 'sandbox_image = "registry.k8s.io/pause:3.10"'
  notify: Restart containerd

- name: Flush handlers to restart containerd now
  meta: flush_handlers

- name: Enable containerd service
  systemd:
    name: containerd
    enabled: true
    state: started

- name: Wait for containerd socket
  wait_for:
    path: /run/containerd/containerd.sock
    state: present
    timeout: 30

# ============================================================
# Kubernetes packages
# ============================================================
- name: Add Kubernetes GPG key
  get_url:
    url: "{{ k8s_apt_key_url }}"
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: "0644"
    force: false

- name: Add Kubernetes apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] {{ k8s_apt_repo }} /"
    state: present
    filename: kubernetes

- name: Update apt cache after K8s repo
  apt:
    update_cache: true

- name: Install kubeadm, kubelet, kubectl
  apt:
    name:
      - kubeadm
      - kubelet
      - kubectl
    state: present

- name: Hold K8s packages to prevent auto-upgrade
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubeadm
    - kubelet
    - kubectl

- name: Enable kubelet service
  systemd:
    name: kubelet
    enabled: true

# ============================================================
# Helm
# ============================================================
- name: Check if Helm is installed
  command: helm version --short
  register: helm_check
  failed_when: false
  changed_when: false

- name: Install Helm
  shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  when: helm_check.rc != 0

# ============================================================
# /etc/hosts
# ============================================================
- name: Update /etc/hosts with all cluster nodes
  template:
    src: etc-hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: "0644"
